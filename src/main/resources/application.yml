server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: shopee-monolith

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/shopee_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}       # (vCPU * 2) + 1
      minimum-idle: 5
      connection-timeout: 20000                    # 20s — báo lỗi thay vì chờ mãi
      idle-timeout: 600000                         # 10 phút — đóng connection idle
      max-lifetime: 1800000                        # 30 phút — buộc rotate, tránh stale connection
      keepalive-time: 300000                       # 5 phút — ping DB giữ connection sống
      leak-detection-threshold: 5000              # Cảnh báo nếu connection bị giữ > 5s

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

  servlet:
    multipart:
      max-file-size: ${MEDIA_MAX_FILE_SIZE:10MB}
      max-request-size: ${MEDIA_MAX_REQUEST_SIZE:10MB}

  jpa:
    hibernate:
      ddl-auto: validate                           # Flyway quản lý schema, Hibernate chỉ validate
    show-sql: false
    open-in-view: false                            # Tắt OSIV — tránh lazy loading ngoài transaction (N+1 ẩn)
    properties:
      hibernate:
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 30
        format_sql: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID}
            client-secret: ${FACEBOOK_CLIENT_SECRET}
            scope: email, public_profile

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  ai:
    google:
      genai:
        api-key: ${GOOGLE_AI_API_KEY}
      chat:
        options:
          model: gemini-1.5-flash
      embedding:
        options:
          model: text-embedding-004

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

jwt:
  issuer: ${JWT_ISSUER:shoppe-monolith}
  audience: ${JWT_AUDIENCE:shoppe-web-client}
  expiration: 10m                                  # 10 phút — Access Token
  refresh-expiration: 7d                           # 7 ngày — Refresh Token
  active-key-id: ${JWT_ACTIVE_KEY_ID:key-v1}
  active-secret: ${JWT_ACTIVE_SECRET}
  previous-key-id: ${JWT_PREVIOUS_KEY_ID:}
  previous-secret: ${JWT_PREVIOUS_SECRET:}

app:
  cart:
    ttl: 7d
    max-quantity-per-item: 99
  notification:
    verification-url: ${FRONTEND_VERIFICATION_URL:http://localhost:3000/verify-email}
    sender: ${MAIL_SENDER:no-reply@shoppe.local}
    retry:
      batch-size: 50
      fixed-delay: 5m
  checkout:
    mock-shipping:
      flat-fee-per-shop: 30000
  payment:
    pending-expiry-minutes: 15                     # Scheduled job quét và cancel order quá hạn
  order:
    timeout:
      batch-size: 50
      check-delay: 10s
  media:
    max-file-size-mb: 10
    allowed-content-types: image/jpeg, image/png, image/webp
    storage:
      type: ${MEDIA_STORAGE_TYPE:local}
      local-dir: ${MEDIA_LOCAL_DIR:${java.io.tmpdir}/shopee-media}
      local-base-url: ${MEDIA_LOCAL_BASE_URL:http://localhost:8080/api/media/files}
      r2:
        endpoint: ${R2_ENDPOINT:}
        access-key-id: ${R2_ACCESS_KEY_ID:}
        secret-access-key: ${R2_SECRET_ACCESS_KEY:}
        bucket: ${R2_BUCKET:}
        public-base-url: ${R2_PUBLIC_BASE_URL:}
  security:
    refresh-token-cleanup:
      batch-size: 500
      fixed-delay: 1h
    auth-cookie:
      name: __Secure-refresh_token
      secure: ${AUTH_COOKIE_SECURE:true}
      http-only: true
      same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
      path: /api/auth
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
      allow-credentials: true
    csrf:
      cookie-name: XSRF-TOKEN
      header-name: X-XSRF-TOKEN
    trusted-proxies: ${TRUSTED_PROXY_CIDRS:}
    oauth2:
      exchange-code-ttl: ${OAUTH2_EXCHANGE_CODE_TTL:60s}
    verification-token:
      ttl: 24h
    event-crypto:
      active-key-id: ${EVENT_CRYPTO_ACTIVE_KEY_ID:crypto-v1}
      active-secret: ${EVENT_CRYPTO_ACTIVE_SECRET}
      previous-key-id: ${EVENT_CRYPTO_PREVIOUS_KEY_ID:}
      previous-secret: ${EVENT_CRYPTO_PREVIOUS_SECRET:}
    rate-limit:
      enabled: true
      anonymous:
        capacity: 100
        window: 1m
      authenticated:
        capacity: 300
        window: 1m
      login:
        capacity: 10
        window: 1m
      register:
        capacity: 5
        window: 1m
      verify:
        capacity: 20
        window: 1m
      oauth2-callback:
        capacity: 30
        window: 1m
      resend-verification:
        capacity: 3
        window: 1m
