server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: shopee-monolith

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/shopee_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}       # (vCPU * 2) + 1
      minimum-idle: 5
      connection-timeout: 20000                    # 20s — báo lỗi thay vì chờ mãi
      idle-timeout: 600000                         # 10 phút — đóng connection idle
      max-lifetime: 1800000                        # 30 phút — buộc rotate, tránh stale connection
      keepalive-time: 300000                       # 5 phút — ping DB giữ connection sống
      leak-detection-threshold: 5000              # Cảnh báo nếu connection bị giữ > 5s

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

  jpa:
    hibernate:
      ddl-auto: validate                           # Flyway quản lý schema, Hibernate chỉ validate
    show-sql: false
    open-in-view: false                            # Tắt OSIV — tránh lazy loading ngoài transaction (N+1 ẩn)
    properties:
      hibernate:
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 30
        format_sql: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID}
            client-secret: ${FACEBOOK_CLIENT_SECRET}
            scope: email, public_profile

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
      embedding:
        options:
          model: text-embedding-3-small

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

jwt:
  issuer: ${JWT_ISSUER:shoppe-monolith}
  audience: ${JWT_AUDIENCE:shoppe-web-client}
  expiration: 10m                                  # 10 phút — Access Token
  refresh-expiration: 7d                           # 7 ngày — Refresh Token
  key-ring:
    active-key-id: key-v1
    keys:
      key-v1: ${JWT_SECRET:this-is-a-very-secure-secret-key-minimum-32-bytes-v1}

app:
  payment:
    pending-expiry-minutes: 15                     # Scheduled job quét và cancel order quá hạn
  media:
    max-file-size-mb: 10
    allowed-content-types: image/jpeg, image/png, image/webp
  security:
    refresh-token-cleanup:
      batch-size: 500
      fixed-delay: 1h
    auth-cookie:
      name: __Secure-refresh_token
      secure: ${AUTH_COOKIE_SECURE:true}
      http-only: true
      same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
      path: /api/auth
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
      allow-credentials: true
    csrf:
      cookie-name: XSRF-TOKEN
      header-name: X-XSRF-TOKEN
    trusted-proxies: ${TRUSTED_PROXY_CIDRS:}
