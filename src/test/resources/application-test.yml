spring:
  # Testcontainers inject datasource, Redis, and Elasticsearch connection settings.
  jpa:
    show-sql: true

  flyway:
    enabled: true

  ai:
    google:
      genai:
        api-key: test-google-ai-key-placeholder

jwt:
  expiration: 600000
  refresh-expiration: 604800000
  active-key-id: key-v1
  active-secret: test-secret-key-for-integration-tests-only-32chars

app:
  security:
    event-crypto:
      active-key-id: crypto-v1
      active-secret: test-event-crypto-secret-32b-key-default-value
    rate-limit:
      enabled: false
